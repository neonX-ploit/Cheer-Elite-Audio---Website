[build]
  command = "echo \"window.__ENV__={FIREBASE_API_KEY:'$FIREBASE_API_KEY',EMAILJS_KEY:'$EMAILJS_KEY',FIREBASE_AUTH_DOMAIN:'$FIREBASE_AUTH_DOMAIN',FIREBASE_PROJECT_ID:'$FIREBASE_PROJECT_ID',FIREBASE_STORAGE_BUCKET:'$FIREBASE_STORAGE_BUCKET',FIREBASE_MESSAGING_SENDER:'$FIREBASE_MESSAGING_SENDER',FIREBASE_APP_ID:'$FIREBASE_APP_ID'};\" > env.js"
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200